<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Challenge Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧮 Arithmetic Challenge</h1>

    <!-- Step 1: Enter Name -->
    <div id="nameSection" class="section">
        <h2>Welcome!</h2>
        <input type="text" id="playerName" placeholder="Enter your name" onkeypress="if(event.key==='Enter') startWithName()">
        <button onclick="startWithName()">Start Game</button>
    </div>

    <!-- Step 2: Select Difficulty -->
    <div id="difficultySection" class="section hidden">
        <h2>Select Difficulty:</h2>
        <button class="diff-btn" onclick="selectDifficulty('easy', this)">😊 Easy</button>
        <button class="diff-btn" onclick="selectDifficulty('medium', this)">😐 Medium</button>
        <button class="diff-btn" onclick="selectDifficulty('hard', this)">😤 Hard</button>
    </div>

    <!-- Step 3: Game -->
    <div id="gameSection" class="section hidden">
        <h2 id="progress"></h2>
        <h2 id="question"></h2>
        <input type="number" id="answer" placeholder="Enter answer" onkeypress="if(event.key==='Enter') submitAnswer()">
        <button onclick="submitAnswer()">Submit</button>
        <h3 id="result"></h3>
    </div>

    <!-- Step 4: Results -->
    <div id="resultSection" class="section hidden">
        <h2>🏁 Challenge Complete!</h2>
        <h3 id="playerInfo"></h3>
        <h3 id="stats"></h3>
        <h3 id="aiStats"></h3>
        <h3 id="times"></h3>
        <h3 id="winner"></h3>
        <button onclick="playAgain()">Play Again</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
